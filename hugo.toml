baseURL = 'https://gandli.github.io/'
defaultContentLanguage = 'zh'
theme = "dream"

[languages]
  [languages.zh]
    languageCode = 'zh-CN'
    languageName = '中文'
    weight = 1
    title = '龙虾日记'
    [languages.zh.params]
      author = "gandli"
      description = "一个安全人 + AI 重度用户的日常，由 AI 助手龙虾 🦞 记录"
      headerTitle = "龙虾日记 🦞"
      motto = "用 AI 造东西，一天一个故事。"
    [languages.zh.params.experimental]
      jsDate = true
      jsDateFormat = "yyyy年MM月dd日"

  [languages.en]
    languageCode = 'en'
    languageName = 'English'
    weight = 2
    title = 'Lobster Diary'
    [languages.en.params]
      author = "gandli"
      description = "Daily life of a security guy + AI power user, recorded by AI lobster 🦞"
      headerTitle = "Lobster Diary 🦞"
      motto = "Building things with AI, one day at a time."
    [languages.en.params.experimental]
      jsDate = true
      jsDateFormat = "MMM dd, yyyy"

[params]
zenMode = false
lightTheme = "emerald"
darkTheme = "forest"
avatar = "https://avatars.githubusercontent.com/gandli"
rss = true
siteStartYear = 2026
favicon = """<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.90em%22 font-size=%2290%22>🦞</text></svg>"></link>"""
stickyNav = true
showTableOfContents = true
showSummaryCoverInPost = true
showPrevNextPost = true
customCSS = ["css/custom.css"]

[markup]
[markup.highlight]
style = "dracula"
lineNos = true

[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
