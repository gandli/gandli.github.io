baseURL: "https://gandli.github.io/"
theme: hextra
enableRobotsTXT: true
enableGitInfo: true
hasCJKLanguage: true
outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]
module:
  hugoVersion:
    extended: true
    min: "0.112.0"

  # workspace: hugo.work
  imports:
    - path: github.com/imfing/hextra
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
enableInlineShortcodes: true
menu:
  main:
    - name: Weekly
      pageRef: /weekly
      weight: 1
    # - name: Documentation
    #   pageRef: /docs
    #   weight: 2
    # - name: Blog
    #   pageRef: /blog
    #   weight: 3
    # - name: About
    #   pageRef: /about
    #   weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/gandli/gandli.github.io/"
      params:
        icon: github
  sidebar:
    - identifier: more
      name: More
      params:
        type: separator
      weight: 1
    # - identifier: about
    #   name: "About"
    #   pageRef: "/about"
    #   weight: 2
    - identifier: hugoDocs
      name: "Hugo Docs ↗"
      url: "https://gohugo.io/documentation/"
      weight: 3
params:
  description: Modern, responsive, batteries-included Hugo theme for creating beautiful static websites.
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      # width: 40
      # height: 20
      # link: /
    width: wide

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: normal

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
    width: normal

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: forward

  weekly:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"

